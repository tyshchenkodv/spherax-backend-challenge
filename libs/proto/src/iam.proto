syntax = "proto3";

package iam;

service IamService {
  rpc GetUserById(GetUserByIdRequest) returns (UserResponse);
  rpc ValidateNotificationRecipient(ValidateNotificationRecipientRequest) returns (UserResponse);
}

message GetUserByIdRequest {
  string id = 1;
}

message ValidateNotificationRecipientRequest {
  string userId = 1;
}

message UserResponse {
  string id = 1;
  string email = 2;
  string name = 3;
  string status = 4;
  string createdAt = 5;
  string updatedAt = 6;
}
